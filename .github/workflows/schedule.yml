name: Weekly OSS Issue Finder

on:
  schedule:
    # Thursday 10pm BDT = Thursday 4pm UTC  (BDT is UTC+6)
    - cron: '0 16 * * 4'

  # Lets you trigger a run manually from the Actions tab at any time
  workflow_dispatch:

jobs:
  find-issues:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run finder
        env:
          # GH_PAT: a personal access token with NO scopes (public data needs none).
          GITHUB_TOKEN:   ${{ secrets.GH_PAT }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TO_EMAIL:       ${{ secrets.TO_EMAIL }}
        run: python finder.py
